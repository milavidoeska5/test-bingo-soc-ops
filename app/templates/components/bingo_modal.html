<div class="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
    <div class="modal-card relative">
        <div class="modal-ring"></div>
        <div class="modal-star">✦</div>
        <h2 class="modal-title">{{ session.completion_title }}</h2>
        <p class="modal-subtitle">{{ session.completion_subtitle }}</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-continue">
            Continue Mission
        </button>
    </div>
</div>
