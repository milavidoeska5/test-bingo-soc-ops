<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6">
    <div class="text-center max-w-sm">
        <span class="cosmic-logo">✦</span>
        <h1 class="title-cosmic mb-2">Soc Ops</h1>
        <p class="subtitle-cosmic mb-8">Social Bingo</p>

        <div class="card-glass mb-8">
            <h2 class="how-to-title mb-3">How to Play</h2>
            <ul class="text-left space-y-2">
                <li class="how-to-item">✦ Find people who match the questions</li>
                <li class="how-to-item">✦ Tap a square when you find a match</li>
                <li class="how-to-item">✦ Get 5 in a row to win!</li>
            </ul>
        </div>

        <form
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="card-glass">
            <h2 class="how-to-title mb-3">Choose Mode</h2>
            <label class="how-to-item text-left mb-2" for="mode-bingo">
                <input id="mode-bingo" type="radio" name="mode" value="bingo" checked>
                Social Bingo
            </label>
            <label class="how-to-item text-left mb-4" for="mode-scavenger-hunt">
                <input id="mode-scavenger-hunt" type="radio" name="mode" value="scavenger_hunt">
                Scavenger Hunt
            </label>

            <button type="submit" class="btn-launch w-full">
                Launch Mission
            </button>
        </form>
    </div>
</div>
</div>
